services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: twitter
      POSTGRES_PASSWORD: twitter_secret
      POSTGRES_DB: twitter_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twitter -d twitter_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  db_data:
